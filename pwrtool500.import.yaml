# PwrTool 500 — User / OTA firmware
# VDBX.io / @clomads / CC-BY-SA 4.0
#
# Hi Friend!
#
# This is where you can customize your PwrTool 500.
# We've broken up the basics into the packages below.
# You can also edit the functions of the MOS and boot button below
substitutions:
  name: pwrtool500
  friendly_name: "PwrTool 500"
  project_name: "vdbxio.PwrTool500"
  project_version: "1.0.0"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true


packages:
  flipc3: github://vdbxio/esphome-configs/packages/flipc3-base.yaml@main
  wifi: github://vdbxio/esphome-configs/packages/flipc3-wifi.yaml@main
  shtc3: github://vdbxio/esphome-configs/packages/parts/env_shtcx.yaml@main
  leds: github://vdbxio/esphome-configs/packages/flipc3-leds.yaml@main
  ina2xx: github://vdbxio/esphome-configs/packages/parts/ina2xx.yaml@main
  ina2xx-soc: github://vdbxio/esphome-configs/packages/parts/ina2xx-soc.yaml@main
  # Used for testing in production. Will dance party when disconnected from HA.
  # Red LED when INA2xx errors.
  # qaset: github://vdbxio/esphome-configs/packages/pwrtool500-qa.yaml@main
  #
  # Example packages - see github.com/vdbxio/esphome-configs for more info:
  # lsm303agr: github://vdbxio/esphome-configs/packages/parts/lsm303agr.yaml@main
  # victron: github://vdbxio/esphome-configs/packages/parts/victron-uart-dev.yaml@main
  # hoursCounter: github://vdbxio/esphome-configs/packages/include/hours-count.yaml@main
  # daly-bms: github://vdbxio/esphome-configs/packages/include/daly-bms.yaml@main

#WiFi credentials - change these in your ESPHome dashboard
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Bluetooth proxy takes up a lot of space, use at your own risk
bluetooth_proxy:


#GPIO 7 output - used for MOS and boot button
output:
  - platform: ledc
    id: gpio_7
    pin:
      number: 7
      inverted: false
#Dimmable MOS output on GPIO 7
light:
  - platform: monochromatic
    name: "PwrTool MOS Dimmable"
    disabled_by_default: true
    output: gpio_7

#Switch MOS output on GPIO 7
switch:
  - platform: output
    name: "PwrTool MOS Switch"
    output: gpio_7

#Time from Home Assistant
time:
  - platform: homeassistant
    id: ha_time
# User button (Boot) on front of device 
binary_sensor:
  - platform: gpio
    id: boot_button
    pin: 
      number: 9
      #allow_other_uses: true
      #ignore_pin_validation_error: true
      mode:
        input: true
        pullup: true
      inverted: True
    name: Boot Button