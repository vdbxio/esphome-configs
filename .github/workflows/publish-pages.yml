name: Publish Pages

on:
  push:
    branches:
      - main
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'
  workflow_run:
    workflows:
      - Publish Firmware
    types:
      - completed
  pull_request:
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - run: mkdir -p output/firmware

      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./static
          destination: ./output

      - name: Fetch firmware files
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: '*'
          out-file-path: output/firmware-staging

      - name: Layout per-product firmware on Pages
        run: |
          set -euo pipefail
          # ESPHome 2026.6+ names: {product}.manifest.json, {product}-esp32c3.ota.bin, etc.
          # Devices expect stable URL: firmware/{product}/manifest.json
          for product in pwrtool500 flip-c3; do
            dest="output/firmware/${product}"
            mkdir -p "$dest"
            while IFS= read -r -d '' f; do
              base=$(basename "$f")
              case "$base" in
                "${product}.manifest.json"|manifest.json)
                  cp "$f" "${dest}/manifest.json"
                  ;;
                *)
                  cp "$f" "$dest/"
                  ;;
              esac
            done < <(find output/firmware-staging -maxdepth 3 -type f -name "${product}*" -print0)
            if [ -f "${dest}/manifest.json" ]; then
              echo "${product}: → firmware/${product}/manifest.json"
            else
              echo "${product}: WARNING — no manifest found" >&2
            fi
          done
          rm -rf output/firmware-staging

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
