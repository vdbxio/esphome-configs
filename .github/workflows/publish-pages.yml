# Deploy static site + latest release firmware to GitHub Pages.
# Triggered only after Publish Firmware completes (not on push to main).
# Stable manifest URLs (overwrite each release):
#   https://vdbxio.github.io/esphome-configs/firmware/pwrtool500/manifest.json
#   https://vdbxio.github.io/esphome-configs/firmware/flip-c3/manifest.json

name: Publish Pages

on:
  workflow_run:
    workflows:
      - Publish Firmware  # Only redeploy Pages after a release build finishes
    types:
      - completed         # Runs even if Publish Firmware failed — check logs if stale
  pull_request:
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml' # PR: build job only, publish job skipped

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # New push/release supersedes in-flight deploy

jobs:
  # Stage Jekyll site + firmware from latest GitHub Release into one Pages artifact
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      # Final Pages tree root — Jekyll output + firmware/ subdirs land here
      - run: mkdir -p output/firmware

      # Compile static/ through Jekyll (GitHub Pages-compatible)
      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./static       # _config.yml, index.html, etc.
          destination: ./output  # Becomes site root on Pages

      # Download every file attached to the newest published release
      - name: Fetch firmware files
        uses: robinraju/release-downloader@v1.13
        with:
          latest: true              # Most recent non-draft release
          fileName: '*'             # All assets (.bin, .manifest.json, .md5, .elf, …)
          out-file-path: output/firmware-staging  # Flat or version-subfolder layout

      # Layout: firmware/{product}/manifest.json + bins (no -esp32c3 in names)
      - name: Layout per-product firmware on Pages
        run: |
          set -euo pipefail
          echo "Release assets:"
          ls -la output/firmware-staging || true
          for product in pwrtool500 flip-c3; do
            dest="output/firmware/${product}"
            mkdir -p "$dest"
            while IFS= read -r -d '' f; do
              base=$(basename "$f")
              case "$base" in
                "${product}.manifest.json"|manifest.json)
                  cp "$f" "${dest}/manifest.json"
                  ;;
                *)
                  cp "$f" "$dest/"
                  ;;
              esac
            done < <(find output/firmware-staging -maxdepth 3 -type f -name "${product}*" -print0)
            bash .github/scripts/normalize-firmware-names.sh "$dest"
            if [ -f "${dest}/manifest.json" ]; then
              echo "${product}: → firmware/${product}/manifest.json"
              ls -la "$dest"
            else
              echo "${product}: WARNING — no manifest (expected ${product}.manifest.json on release)" >&2
            fi
          done
          rm -rf output/firmware-staging

      # Hand off output/ to the publish job via GitHub Pages deployment API
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: output
          retention-days: 1  # Short-lived; deploy job consumes immediately

  # Push artifact to live GitHub Pages (main + workflow_run only)
  publish:
    if: github.event_name != 'pull_request'  # PRs validate build without going live
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write    # Deploy to Pages
      id-token: write # OIDC auth to Pages API
    environment:
      name: github-pages  # Uses repo Settings → Environments → github-pages URL
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
