name: Publish Pages

on:
  push:
    branches:
      - main
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'
  workflow_run:
    workflows:
      - Publish Firmware
    types:
      - completed
  pull_request:
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - run: mkdir -p output/firmware

      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./static
          destination: ./output

      - name: Fetch firmware files
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: '*'
          out-file-path: output/firmware-staging

      - name: Layout per-product firmware on Pages
        run: |
          set -euo pipefail
          # Stable URLs (overwrite each release):
          #   .../firmware/pwrtool500/manifest.json  — managed OTA + web tools
          #   .../firmware/flip-c3/manifest.json     — ESP Web Tools installer only
          for product in pwrtool500 flip-c3; do
            dest="output/firmware/${product}"
            mkdir -p "$dest"
            while IFS= read -r -d '' f; do
              cp "$f" "$dest/"
            done < <(find output/firmware-staging -type f -name "${product}.*" -print0)
            while IFS= read -r -d '' m; do
              dir=$(dirname "$m")
              if compgen -G "${dir}/${product}.*" > /dev/null; then
                cp "$m" "${dest}/manifest.json"
                echo "${product}: manifest + bins → firmware/${product}/"
                break
              fi
            done < <(find output/firmware-staging -name manifest.json -print0)
          done
          rm -rf output/firmware-staging

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
