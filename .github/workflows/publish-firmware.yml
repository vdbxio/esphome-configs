# Compile factory/user firmware on GitHub Release and attach binaries to the release.
# Each build produces .factory.bin, .ota.bin, and manifest.json (MD5 included).
# Publishes to the release asset list; Publish Pages picks these up afterward.

name: Publish Firmware

on:
  release:
    types: [published]  # Draft releases do not trigger this

permissions:
  contents: write  # Required to upload release assets

jobs:
  # Reusable ESPHome workflow: compile each yaml, stamp version: dev → release tag
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2026.4.1
    with:
      #### Modify below here to match your project ####
      # flip-c3.yaml — FLIP-C3 web installer (no device OTA)
      # pwrtool500.factory.yaml — ships on device; managed OTA via manifest
      files: |
        flip-c3.yaml
        pwrtool500.factory.yaml
      esphome-version: 2026.6.0

      # ota.summary patched in upload job (release body breaks build-action heredoc)
      release-summary: ${{ github.event.release.tag_name }}
      # Written into manifest.json ota.release_url
      release-url: ${{ github.event.release.html_url }}
      # sed replaces "version: dev" in yaml before compile; also manifest "version" field
      release-version: ${{ github.event.release.tag_name }}

  # Flatten build artifacts, strip -esp32c3 from names, upload to GitHub Release
  upload-to-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs:
      - build-firmware
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6  # normalize-firmware-names.sh

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: files
          # One subdir per matrix job (flip-c3/, pwrtool500/). merge-multiple collides
          # on output/0.9.3/ and leaves a single 0.9.3.manifest.json.

      - name: Package release assets
        env:
          VERSION: ${{ github.event.release.tag_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail
          mkdir -p output
          shopt -s nullglob
          # ESPHome workflows: files/<device>/<version>/manifest.json + bins
          for device_dir in files/*/; do
            device=$(basename "$device_dir")
            [ "$device" = "$VERSION" ] && continue
            version_dir="${device_dir}${VERSION}/"
            [ -d "$version_dir" ] || { echo "skip $device: no ${VERSION}/" >&2; continue; }
            [ -f "${version_dir}manifest.json" ] || { echo "skip $device: no manifest" >&2; continue; }
            cp "${version_dir}manifest.json" "output/${device}.manifest.json"
            for bin in "${version_dir}"*.bin "${version_dir}"*.elf; do
              [ -f "$bin" ] || continue
              base=$(basename "$bin")
              md5sum "$bin" | awk '{print $1}' > "output/${base}.md5"
              sha256sum "$bin" | awk '{print $1}' > "output/${base}.sha256"
              cp "$bin" "output/"
            done
            echo "packaged: $device"
          done
          if ! compgen -G "output/*.manifest.json" > /dev/null; then
            echo "No manifests packaged — artifact layout:" >&2
            find files -type f | head -50 >&2
            exit 1
          fi
          bash .github/scripts/normalize-firmware-names.sh output
          bash .github/scripts/patch-manifest-release-info.sh output
          ls -la output/

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" output/* --clobber
          else
            gh release create "$VERSION" output/* --title "$VERSION"
          fi
