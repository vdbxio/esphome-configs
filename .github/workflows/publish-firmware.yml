# Compile factory/user firmware on GitHub Release and attach binaries to the release.
# Each build produces .factory.bin, .ota.bin, and manifest.json (MD5 included).
# Publishes to the release asset list; Publish Pages picks these up afterward.

name: Publish Firmware

on:
  release:
    types: [published]  # Draft releases do not trigger this

permissions:
  contents: write  # Required to upload release assets

jobs:
  # Reusable ESPHome workflow: compile each yaml, stamp version: dev → release tag
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2026.4.1
    with:
      #### Modify below here to match your project ####
      # Newline-separated list — one ESPHome compile job per file
      files: |
        flip-c3.yaml             # FLIP-C3: web installer manifest + bins (no device OTA)
        pwrtool500.factory.yaml  # PwrTool: ships on device; managed OTA via manifest
      # Pin ESPHome CLI version used inside the Docker build image
      esphome-version: 2026.6.0
      #### Per-product Pages URLs: firmware/${name}/manifest.json

      # Written into manifest.json ota.summary (optional, shown in HA update UI)
      release-summary: ${{ github.event.release.body }}
      # Written into manifest.json ota.release_url
      release-url: ${{ github.event.release.html_url }}
      # sed replaces "version: dev" in yaml before compile; also manifest "version" field
      release-version: ${{ github.event.release.tag_name }}

  # Flatten build artifacts, strip -esp32c3 from names, upload to GitHub Release
  upload-to-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs:
      - build-firmware
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6  # normalize-firmware-names.sh

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: files
          merge-multiple: true

      - name: Package release assets
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p output
          # Same layout as esphome/workflows upload-to-gh-release (per-device / version dirs)
          pushd files
          for device in *; do
            [ -d "$device" ] || continue
            pushd "$device"
            if [ "$device" != "$VERSION" ]; then
              pushd "$VERSION"
              out="../../../output/"
            else
              out="../../output/"
            fi
            cp manifest.json "${out}${device}.manifest.json"
            for bin in *.bin *.elf; do
              [ -f "$bin" ] || continue
              md5sum "$bin" | awk '{print $1}' > "${out}${bin}.md5"
              sha256sum "$bin" | awk '{print $1}' > "${out}${bin}.sha256"
              cp "$bin" "$out"
            done
            if [ "$device" != "$VERSION" ]; then popd; fi
            popd
          done
          popd
          # ESPHome 2026.6+ embeds chip in filenames — remove for stable names
          bash .github/scripts/normalize-firmware-names.sh output
          ls -la output/

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" output/* --clobber
          else
            gh release create "$VERSION" output/* --title "$VERSION"
          fi
