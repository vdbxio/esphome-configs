# Internal Battery Settings Sensors - Used to sync with number entities
sensor:
  - platform: modbus_controller
    modbus_controller_id: epever
    id: battery_type_read
    address: 0x9000
    internal: true
    register_type: holding
    value_type: U_WORD
    skip_updates: 50
    on_value:
      then:
        - lambda: |-
            id(battery_type_config).publish_state(x);

  - platform: modbus_controller
    modbus_controller_id: epever
    id: battery_capacity_read
    address: 0x9001
    internal: true
    register_type: holding
    value_type: U_WORD
    on_value:
      then:
        - lambda: |-
            id(battery_capacity_config).publish_state(x);

  - platform: modbus_controller
    modbus_controller_id: epever
    id: temperature_compensation_coefficient_read
    address: 0x9002
    internal: true
    register_type: holding
    value_type: U_WORD
    filters:
      - multiply: 0.01
    on_value:
      then:
        - lambda: |-
            id(temperature_compensation_coefficient_config).publish_state(x);

  - platform: modbus_controller
    modbus_controller_id: epever
    id: high_voltage_disconnect_read
    address: 0x9003
    internal: true
    register_type: holding
    value_type: U_WORD
    filters:
      - multiply: 0.01
