# Battery Settings - Number Entities for Configuration
number:
  - platform: template
    id: battery_type_config
    name: "Battery Type"
    min_value: 0
    max_value: 3
    step: 1
    mode: box
    optimistic: true
    # 0 = User, 1 = Sealed, 2 = Gel, 3 = Flooded

  - platform: template
    id: battery_capacity_config
    name: "Battery Capacity"
    min_value: 1
    max_value: 1000
    step: 1
    mode: box
    optimistic: true
