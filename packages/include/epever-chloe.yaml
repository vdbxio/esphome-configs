text_sensor:
  - platform: modbus_controller
    modbus_controller_id: epever
    name: "rtc_clock"
    id: rtc_clock
    internal: true
    register_type: holding
    address: 0x9013
    register_count: 3
    raw_encode: HEXBYTES
    response_size: 6
    entity_category: diagnostic
    #                /*
    #                E20 Real time clock 9013 D7-0 Sec, D15-8 Min
    #                E21 Real time clock 9014 D7-0 Hour, D15-8 Day
    #                E22 Real time clock 9015 D7-0 Month, D15-8 Year
    #                */
    on_value:
      then:
        - lambda: |-
            ESP_LOGV("main", "decoding rtc hex encoded raw data: %s", x.c_str());
            uint8_t h=0,m=0,s=0,d=0,month_=0,y = 0 ;
            m = esphome::modbus_controller::byte_from_hex_str(x,0);
            s = esphome::modbus_controller::byte_from_hex_str(x,1);
            d = esphome::modbus_controller::byte_from_hex_str(x,2);
            h = esphome::modbus_controller::byte_from_hex_str(x,3);
            y = esphome::modbus_controller::byte_from_hex_str(x,4);
            month_ = esphome::modbus_controller::byte_from_hex_str(x,5);
            // Now check if the rtc time of the controller is ok and correct it
            time_t now = ::time(nullptr);
            struct tm *time_info = ::localtime(&now);
            int seconds = time_info->tm_sec;
            int minutes = time_info->tm_min;
            int hour = time_info->tm_hour;
            int day = time_info->tm_mday;
            int month = time_info->tm_mon + 1;
            int year = time_info->tm_year % 100;
            // correct time if needed (ignore seconds)
            if (d != day || month_ != month || y != year || h != hour || m != minutes) {
              // create the payload
              std::vector<uint16_t> rtc_data = {uint16_t((minutes << 8) | seconds), uint16_t((day << 8) | hour),
                                                uint16_t((year << 8) | month)};
              // Create a modbus command item with the time information as the payload
              esphome::modbus_controller::ModbusCommandItem set_rtc_command = esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(epever, 0x9013, 3, rtc_data);
              // Submit the command to the send queue
              epever->queue_command(set_rtc_command);
              ESP_LOGI("ModbusLambda", "EPSOLAR RTC set to %02d:%02d:%02d %02d.%02d.%04d", hour, minutes, seconds, day, month, year + 2000);
            }
            char buffer[20];
            // format time as YYYY-mm-dd hh:mm:ss
            sprintf(buffer,"%04d-%02d-%02d %02d:%02d:%02d",y+2000,month_,d,h,m,s);
            id(template_rtc).publish_state(buffer);

  - platform: template
    name: "RTC Time"
    id: template_rtc
    entity_category: diagnostic
    icon: "mdi:clock"

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Battery Voltage Status"
    address: 0x3200
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0x0F
    entity_category: diagnostic
    icon: "mdi:battery"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      switch(value) {
        case 0: return std::string("Normal");
        case 1: return std::string("Over");
        case 2: return std::string("Under");
        case 3: return std::string("Over Discharge");
        case 4: return std::string("Fault");
        default: return std::string("Unknown");
      }

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Battery Temperature Status"
    address: 0x3200
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0xF0
    entity_category: diagnostic
    icon: "mdi:thermometer"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      uint8_t temp_status = (value >> 4) & 0x0F;
      switch(temp_status) {
        case 0: return std::string("Normal");
        case 1: return std::string("Over (High)");
        case 2: return std::string("Under (Low)");
        default: return std::string("Unknown");
      }

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Battery Resistance Status"
    address: 0x3200
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0x100
    entity_category: diagnostic
    icon: "mdi:resistor"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      return (value & 0x100) ? std::string("Abnormal") : std::string("Normal");

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Battery Voltage ID Status"
    address: 0x3200
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0x8000
    entity_category: diagnostic
    icon: "mdi:alert-circle"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      return (value & 0x8000) ? std::string("Wrong ID") : std::string("Correct ID");

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Charger Input Voltage Status"
    address: 0x3201
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0xC000
    entity_category: diagnostic
    icon: "mdi:lightning-bolt"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      uint8_t input_status = (value >> 14) & 0x03;
      switch(input_status) {
        case 0: return std::string("Normal");
        case 1: return std::string("No Power");
        case 2: return std::string("High Voltage");
        case 3: return std::string("Voltage Error");
        default: return std::string("Unknown");
      }

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Charger Status"
    address: 0x3201
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0x0C
    entity_category: diagnostic
    icon: "mdi:battery-charging"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      uint8_t charging_status = (value >> 2) & 0x03;
      switch(charging_status) {
        case 0: return std::string("Discharging");
        case 1: return std::string("Float");
        case 2: return std::string("Boost");
        case 3: return std::string("Equalization");
        default: return std::string("Unknown");
      }

  - platform: modbus_controller
    modbus_controller_id: epever
    name: "Charger Fault Status"
    address: 0x3201
    register_type: read
    raw_encode: HEXBYTES
    bitmask: 0x02
    entity_category: diagnostic
    icon: "mdi:alert"
    lambda: |-
      uint16_t value = esphome::modbus_controller::word_from_hex_str(x, 0);
      return (value & 0x02) ? std::string("Fault") : std::string("Normal");

  - platform: modbus_controller
    modbus_controller_id: epever
