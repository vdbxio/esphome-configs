# LSM303AGR I²C Device Configuration
i2c_device:
  - id: lsm303_accel
    address: 0x19  # Accelerometer address
  - id: lsm303_mag
    address: 0x1E  # Magnetometer address

# LSM303AGR Accelerometer Sensors
sensor:
  - platform: template
    name: "Accelerometer X"
    id: accel_x
    unit_of_measurement: "m/s²"
    accuracy_decimals: 2
    lambda: |-
      // Read accelerometer data from LSM303AGR
      // Register 0x28-0x2D contain X, Y, Z acceleration data
      if (auto data = id(lsm303_accel).read_byte(0x28)) {
        int16_t x_low = *data;
        if (auto data2 = id(lsm303_accel).read_byte(0x29)) {
          int16_t x_high = *data2;
          int16_t x_raw = (x_high << 8) | x_low;
          return x_raw * 0.001; // Convert to m/s² (assuming ±2g range)
        }
      }
      return 0.0;
    update_interval: 100ms

  - platform: template
    name: "Accelerometer Y"
    id: accel_y
    unit_of_measurement: "m/s²"
    accuracy_decimals: 2
    lambda: |-
      if (auto data = id(lsm303_accel).read_byte(0x2A)) {
        int16_t y_low = *data;
        if (auto data2 = id(lsm303_accel).read_byte(0x2B)) {
          int16_t y_high = *data2;
          int16_t y_raw = (y_high << 8) | y_low;
          return y_raw * 0.001;
        }
      }
      return 0.0;
    update_interval: 100ms

  - platform: template
    name: "Accelerometer Z"
    id: accel_z
    unit_of_measurement: "m/s²"
    accuracy_decimals: 2
    lambda: |-
      if (auto data = id(lsm303_accel).read_byte(0x2C)) {
        int16_t z_low = *data;
        if (auto data2 = id(lsm303_accel).read_byte(0x2D)) {
          int16_t z_high = *data2;
          int16_t z_raw = (z_high << 8) | z_low;
          return z_raw * 0.001;
        }
      }
      return 0.0;
    update_interval: 100ms

  # LSM303AGR Magnetometer Sensors
  - platform: template
    name: "Magnetometer X"
    id: mag_x
    unit_of_measurement: "µT"
    accuracy_decimals: 2
    lambda: |-
      // Read magnetometer data from LSM303AGR
      // Register 0x03-0x08 contain X, Y, Z magnetic data
      if (auto data = id(lsm303_mag).read_byte(0x03)) {
        int16_t x_low = *data;
        if (auto data2 = id(lsm303_mag).read_byte(0x04)) {
          int16_t x_high = *data2;
          int16_t x_raw = (x_high << 8) | x_low;
          return x_raw * 0.1; // Convert to µT
        }
      }
      return 0.0;
    update_interval: 100ms

  - platform: template
    name: "Magnetometer Y"
    id: mag_y
    unit_of_measurement: "µT"
    accuracy_decimals: 2
    lambda: |-
      if (auto data = id(lsm303_mag).read_byte(0x05)) {
        int16_t y_low = *data;
        if (auto data2 = id(lsm303_mag).read_byte(0x06)) {
          int16_t y_high = *data2;
          int16_t y_raw = (y_high << 8) | y_low;
          return y_raw * 0.1;
        }
      }
      return 0.0;
    update_interval: 100ms

  - platform: template
    name: "Magnetometer Z"
    id: mag_z
    unit_of_measurement: "µT"
    accuracy_decimals: 2
    lambda: |-
      if (auto data = id(lsm303_mag).read_byte(0x07)) {
        int16_t z_low = *data;
        if (auto data2 = id(lsm303_mag).read_byte(0x08)) {
          int16_t z_high = *data2;
          int16_t z_raw = (z_high << 8) | z_low;
          return z_raw * 0.1;
        }
      }
      return 0.0;
    update_interval: 100ms

# Initialize LSM303AGR sensor on startup
esphome:
    on_boot:
    - lambda: |-
        // Initialize accelerometer
        id(lsm303_accel).write_byte(0x20, 0x47); // CTRL_REG1_A: Enable XYZ axes, 50Hz
        id(lsm303_accel).write_byte(0x23, 0x00); // CTRL_REG4_A: ±2g scale
        
        // Initialize magnetometer
        id(lsm303_mag).write_byte(0x00, 0x14); // CRA_REG_M: 30Hz, normal mode
        id(lsm303_mag).write_byte(0x01, 0x20); // CRB_REG_M: ±1.3 gauss scale
        id(lsm303_mag).write_byte(0x02, 0x00); // MR_REG_M: Continuous conversion mode 