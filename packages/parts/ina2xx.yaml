#
# ina2xx: !include {file: "packages/parts/ina2xx.yaml", vars: {address: 0x40}}
#
# Standalone: signed battery-style readings (offset + optional Invert).
# With ina2xx-soc: Mode select sets ina_unidir_mode (abs for Load/Charger).

substitutions:
  address: "0x40"

globals:
  - id: ina_unidir_mode
    type: bool
    restore_value: yes
    initial_value: 'false'

switch:
  # Battery mode only — flip shunt sign without re-zeroing. Hidden until enabled in HA.
  - platform: template
    name: "Invert"
    id: invert
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: config
    disabled_by_default: true

button:
  - platform: template
    name: Offset - Set
    id: zero_offset
    entity_category: config
    icon: "mdi:circle"
    on_press:
      - logger.log: "Setting Offset"
      - number.set:
          id: offsetI_num
          value: !lambda 'return id(offsetI_num).state + id(rawI).state;'
      - logger.log:
          format: "Current - %.1f / Power - %.1f"
          args: [ 'id(offsetI_num).state', 'id(offsetI_num).state * id(rawV).state' ]
  - platform: template
    name: Offset - Clear
    id: clear_offset
    entity_category: config
    icon: "mdi:circle"
    on_press:
      - logger.log: "Clearing Offset"
      - number.set:
          id: offsetI_num
          value: 0.0
      - logger.log:
          format: "Current - %.1f / Power - %.1f"
          args: [ '0.0f', '0.0f' ]

number:
  - platform: template
    id: offsetI_num
    name: "Offset - Current"
    initial_value: 0.0
    min_value: -500.0
    max_value: 500.0
    step: 0.01
    optimistic: true
    restore_value: yes
    device_class: "current"
    unit_of_measurement: "A"
    entity_category: config
    on_value:
      - logger.log:
          format: "Current Offset set to %.1f"
          args: [ 'id(offsetI_num).state' ]

sensor:
  - platform: ina2xx_i2c
    id: ina23x
    address: ${address} # default: 0x40
    shunt_resistance: 0.00015 ohm
    model: INA238
    max_current: 500 A
    adc_range: 0
    adc_time: 4120 us
    adc_averaging: 128
    update_interval: 100ms
    shunt_voltage:
      name: "Shunt - Voltage"
      device_class: "voltage"
      unit_of_measurement: "mV"
      accuracy_decimals: 3
      disabled_by_default: true
    bus_voltage:
      name: "Bus - Voltage"
      id: rawV
      device_class: "voltage"
      unit_of_measurement: "V"
      accuracy_decimals: 3
    current:
      name: "Bus - Current"
      id: rawI
      device_class: "current"
      unit_of_measurement: "A"
      accuracy_decimals: 2
      filters:
      - lambda: !lambda 'return x - id(offsetI_num).state;'
      - lambda: !lambda |-
          if (!id(ina_unidir_mode)) {
            if (id(invert).state) return {x * -1};
            return x;
          }
          return x < 0.0f ? -x : x;
    power:
      name: "Bus - Power"
      id: rawP
      device_class: "power"
      unit_of_measurement: "W"
      accuracy_decimals: 2
      filters:
      - lambda: !lambda |-
          float i = id(rawI).get_raw_state() - id(offsetI_num).state;
          if (!id(ina_unidir_mode)) {
            if (id(invert).state) i *= -1;
            return i * id(rawV).state;
          }
          if (i < 0.0f) i = -i;
          return i * id(rawV).state;
    temperature:
      name: "Temperature - Shunt"
      accuracy_decimals: 2
