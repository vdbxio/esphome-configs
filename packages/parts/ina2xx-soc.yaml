# INA2XX State of Charge (SoC) via Amp-Hour Integration
# Voidbox Industries & Chloe Madison
# VDBX.io / @clomads
# CC-BY-SA 4.0
#
# AI disclaimer: parts written or revised with AI assistance
#
# Usage: !include {file: "packages/parts/ina2xx-soc.yaml", vars: {current_id: rawI}}
#
# Requires packages/parts/ina2xx.yaml (rawI, rawP). Provides Mode select → ina_unidir_mode.
#
# Integration / split sensors are disabled_by_default — enable the ones you need in HA:
#   Battery: In/Out splits + Net Charge Delta + dailies as desired
#   Load: enable Out integrators (In templates stay at 0)
#   Charger: enable In integrators (Out templates stay at 0)
#
# SoC % stays visible in all modes but only updates in Battery mode (frozen on Load/Charger).

substitutions:
  current_id: "rawI"           # From ina2xx.yaml (after mode filters)
  soc_min: "0.0"
  soc_max: "100.0"

esphome:
  on_boot:
    - priority: -100.0
      then:
        - lambda: |-
            id(ina_unidir_mode) = (id(mode_select).current_option() != "Battery Monitor - Bidirectional");

select:
  - platform: template
    id: mode_select
    name: "Mode"
    optimistic: true
    restore_value: yes
    entity_category: config
    options:
      - "Battery Monitor - Bidirectional"
      - "DC Load - Unidirectional"
      - "DC Charger - Unidirectional"
    on_value:
      - lambda: |-
          id(ina_unidir_mode) = (id(mode_select).current_option() != "Battery Monitor - Bidirectional");


number:
  - platform: template
    id: soc_capacity_ah_num
    name: "Capacity - Ah"
    initial_value: 100.0
    min_value: 0.0
    max_value: 1000.0
    step: 0.1
    optimistic: true
    restore_value: yes
    device_class: "energy"
    unit_of_measurement: "Ah"
    entity_category: config

globals:
  - id: soc_percent
    type: float
    restore_value: yes
    initial_value: '100.0'
  - id: current_charge_ah
    type: float
    restore_value: yes
    initial_value: '100.0'

sensor:
  # --- Directional splits (feed lifetime integrators below) ---
  - platform: template
    id: current_in
    name: "Current In"
    lambda: !lambda |-
      if (id(mode_select).current_option() == "DC Load - Unidirectional") return 0.0f;
      if (id(mode_select).current_option() == "DC Charger - Unidirectional") return id(rawI).state;
      return id(rawI).state > 0.0f ? id(rawI).state : 0.0f;
    update_interval: 1s
    disabled_by_default: true
    entity_category: diagnostic
    device_class: "current"
    unit_of_measurement: "A"
    state_class: "measurement"
    accuracy_decimals: 2
  - platform: template
    id: current_out
    name: "Current Out"
    lambda: !lambda |-
      if (id(mode_select).current_option() == "DC Charger - Unidirectional") return 0.0f;
      if (id(mode_select).current_option() == "DC Load - Unidirectional") return id(rawI).state;
      return id(rawI).state < 0.0f ? -id(rawI).state : 0.0f;
    update_interval: 1s
    disabled_by_default: true
    entity_category: diagnostic
    device_class: "current"
    unit_of_measurement: "A"
    state_class: "measurement"
    accuracy_decimals: 2
  - platform: template
    id: power_in
    name: "Power In"
    lambda: !lambda |-
      if (id(mode_select).current_option() == "DC Load - Unidirectional") return 0.0f;
      if (id(mode_select).current_option() == "DC Charger - Unidirectional") return id(rawP).state;
      return id(rawP).state > 0.0f ? id(rawP).state : 0.0f;
    update_interval: 1s
    disabled_by_default: true
    entity_category: diagnostic
    device_class: "power"
    unit_of_measurement: "W"
    state_class: "measurement"
    accuracy_decimals: 2
  - platform: template
    id: power_out
    name: "Power Out"
    lambda: !lambda |-
      if (id(mode_select).current_option() == "DC Charger - Unidirectional") return 0.0f;
      if (id(mode_select).current_option() == "DC Load - Unidirectional") return id(rawP).state;
      return id(rawP).state < 0.0f ? -id(rawP).state : 0.0f;
    update_interval: 1s
    disabled_by_default: true
    entity_category: diagnostic
    device_class: "power"
    unit_of_measurement: "W"
    state_class: "measurement"
    accuracy_decimals: 2

  # --- Lifetime Ah / Wh (reset only via HA or reflash; restore: true) ---
  - platform: integration
    name: "Charge In"
    id: soc_charge_in_ah
    sensor: current_in
    time_unit: h
    accuracy_decimals: 3
    unit_of_measurement: "Ah"
    restore: true
    disabled_by_default: true
    state_class: "total_increasing"
    entity_category: diagnostic
  - platform: integration
    name: "Charge Out"
    id: soc_discharge_out_ah
    sensor: current_out
    time_unit: h
    accuracy_decimals: 3
    unit_of_measurement: "Ah"
    restore: true
    disabled_by_default: true
    state_class: "total_increasing"
    entity_category: diagnostic
  - platform: integration
    name: "Energy In"
    id: soc_power_in_wh
    sensor: power_in
    time_unit: h
    accuracy_decimals: 2
    unit_of_measurement: "Wh"
    restore: true
    disabled_by_default: true
    state_class: "total_increasing"
    entity_category: diagnostic
  - platform: integration
    name: "Energy Out"
    id: soc_power_out_wh
    sensor: power_out
    time_unit: h
    accuracy_decimals: 2
    unit_of_measurement: "Wh"
    restore: true
    disabled_by_default: true
    state_class: "total_increasing"
    entity_category: diagnostic

  # Signed net Ah since last SoC reset — drives SoC % in Battery mode only
  - platform: integration
    name: "Net Charge Delta"
    id: net_ah
    sensor: ${current_id}
    time_unit: h
    accuracy_decimals: 3
    unit_of_measurement: "Ah"
    restore: true
    disabled_by_default: true
    on_value:
      - lambda: !lambda |-
          if (id(mode_select).current_option() != "Battery Monitor - Bidirectional") return;
          id(current_charge_ah) = id(soc_capacity_ah_num).state + x;
          float percent = 100.0f * (id(current_charge_ah) / id(soc_capacity_ah_num).state);
          if (percent < ${soc_min}) percent = ${soc_min};
          if (percent > ${soc_max}) percent = ${soc_max};
          id(soc_percent) = percent;
      - sensor.template.publish:
          id: soc_percent_sensor
          state: !lambda 'return id(soc_percent);'
    entity_category: diagnostic

  - platform: template
    id: soc_percent_sensor
    name: "State of Charge (SoC)"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: "battery"
    state_class: "measurement"
    lambda: 'return id(soc_percent);'
    update_interval: 10s

  # total_daily_energy integrates any sensor over h (Wh from W, Ah from A); resets at midnight
  - platform: total_daily_energy
    name: "Energy - Daily"
    power_id: rawP
    accuracy_decimals: 2
    disabled_by_default: true
    entity_category: diagnostic
  - platform: total_daily_energy
    name: "Charge - Daily"
    power_id: ${current_id}
    accuracy_decimals: 2
    disabled_by_default: true
    entity_category: diagnostic

button:
  - platform: template
    name: "Reset SoC to 100%"
    id: soc_reset
    icon: "mdi:battery-sync"
    entity_category: config
    on_press:
      - lambda: |-
          id(current_charge_ah) = id(soc_capacity_ah_num).state;
          id(soc_percent) = 100.0;
      - sensor.integration.reset: net_ah
      - sensor.template.publish:
          id: soc_percent_sensor
          state: 100.0
      - logger.log: "SoC reset to 100%"
