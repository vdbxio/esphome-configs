# AI disclaimer: Parts of this file were written or revised with AI assistance;
# verify behavior on hardware before relying on it in production.
#
# Replaces flipc3-qa on PwrTool builds: Color Wipe Fast when INA2xx is healthy;
# solid red on setup failure, errors/warnings, or no valid bus voltage yet.
# Stops when connected to HA.
#
# Requires packages: flipc3-leds (onboard_rgb), parts/ina2xx.yaml (ina23x, rawV).

script:
  - id: pwrtool_qa_ina_rgb_update
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ina23x).is_failed() || id(ina23x).status_has_error() ||
                     id(ina23x).status_has_warning() || !id(rawV).has_state() ||
                     (id(rawV).state != id(rawV).state);
          then:
            - light.turn_on:
                id: onboard_rgb
                brightness: 25%
                red: 100%
                green: 0%
                blue: 0%
                effect: none
          else:
            - light.turn_on:
                id: onboard_rgb
                brightness: 25%
                effect: "Color Wipe Fast"

esphome:
  on_boot:
    - priority: -50.0
      then:
        - script.execute: pwrtool_qa_ina_rgb_update

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            not:
              api.connected:
          then:
            - script.execute: pwrtool_qa_ina_rgb_update

binary_sensor:
  - platform: gpio
    id: boot_button
    pin:
      number: 9
      mode:
        input: true
        pullup: true
      inverted: true
    name: Boot Button
    on_press:
      then:
        if:
          condition:
            binary_sensor.is_off: conn_status
          then:
            - light.toggle:
                id: onboard_rgb
  - platform: status
    name: "${friendly_name} Status"
    id: conn_status
    on_state:
      if:
        condition:
          api.connected:
        then:
          - light.turn_off:
              id: onboard_rgb
